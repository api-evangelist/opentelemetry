name: OpenTelemetry
description: Vendor-neutral open-source observability framework for cloud-native software,
  providing a collection of tools, APIs, and SDKs for instrumenting, generating, collecting,
  and exporting telemetry data including metrics, logs, and traces.
url: https://opentelemetry.io
tags:
- Observability
- Monitoring
- Tracing
- Metrics
- Logging
- Cloud Native
- Open Source
created: '2025'
modified: '2025'
apis:
- name: OpenTelemetry Protocol (OTLP) HTTP API
  description: >-
    The OTLP HTTP API provides endpoints for exporting traces, metrics,
    and logs using the OpenTelemetry Protocol, the native wire format
    for transmitting telemetry data between instrumented applications,
    collectors, and observability backends.
  properties:
  - type: X-openapi
    url: openapi.yml
  - type: X-json-schema
    url: json-schema.json
  - type: X-json-ld-context
    url: context.jsonld
common: []
